services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cc
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "15432:5432"
    volumes:
      - "./scripts/postgres:/docker-entrypoint-initdb.d:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cc"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  localstack:
    image: localstack/localstack:3.7.2
    environment:
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "0"
      SERVICES: sns,sqs,dynamodb,kms,secretsmanager
    ports:
      - "14566:4566"
    volumes:
      - "./scripts/localstack:/etc/localstack/init/ready.d"
      - "localstack-data:/var/lib/localstack"
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.61.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14317:4317"
      - "14318:4318"

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "13100:3100"
    volumes:
      - "./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.106.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
    ports:
      - "14319:4317"
      - "14320:4318"
      - "18889:8889"
    volumes:
      - "./observability/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "19090:9090"
    depends_on:
      - otel-collector
    volumes:
      - "./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
      - loki

  balance-service:
    build:
      context: .
      dockerfile: services/balance-service/Dockerfile
    environment:
      BALANCE_HTTP_ADDR: ":8082"
      BALANCE_REDIS_ADDR: "redis:6379"
      BALANCE_POSTGRES_DSN: "postgres://postgres:postgres@postgres:5432/cc?sslmode=disable"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/readyz >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  ledger-service:
    build:
      context: .
      dockerfile: services/ledger-service/Dockerfile
    environment:
      LEDGER_HTTP_ADDR: ":8083"
      LEDGER_GRPC_ADDR: ":9093"
      LEDGER_DYNAMO_ENDPOINT: "http://localstack:4566"
      LEDGER_TABLE_NAME: "cc-ledger-local"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8083/readyz >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    environment:
      AUTH_HTTP_ADDR: ":8081"
      AUTH_GRPC_ADDR: ":9091"
      AUTH_DYNAMO_ENDPOINT: "http://localstack:4566"
      AUTH_IDEMPOTENCY_TABLE: "cc-ledger-local"
      AUTH_BALANCE_BASE_URL: "http://balance-service:8082"
      AUTH_LEDGER_GRPC_ADDR: "ledger-service:9093"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
    depends_on:
      balance-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/readyz >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  edge-gateway:
    image: envoyproxy/envoy:v1.31-latest
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    depends_on:
      auth-service:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - "./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro"

volumes:
  localstack-data:
