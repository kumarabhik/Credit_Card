services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cc
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cc"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  localstack:
    image: localstack/localstack:3.7.2
    environment:
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "0"
      SERVICES: sns,sqs,dynamodb,kms,secretsmanager
    ports:
      - "14566:4566"
    volumes:
      - "./scripts/localstack:/etc/localstack/init/ready.d"
      - "localstack-data:/var/lib/localstack"
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.61.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14317:4317"
      - "14318:4318"

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "13100:3100"
    volumes:
      - "./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.106.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
    ports:
      - "14319:4317"
      - "14320:4318"
      - "18889:8889"
    volumes:
      - "./observability/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "19090:9090"
    depends_on:
      - otel-collector
    volumes:
      - "./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
      - loki

  smoke-auth:
    image: python:3.13-slim
    working_dir: /workspace
    command: ["python", "-u", "services/auth-service/dev/smoke_server.py"]
    environment:
      PORT: "8080"
    volumes:
      - ".:/workspace"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/readyz').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  edge-gateway:
    image: envoyproxy/envoy:v1.31-latest
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    depends_on:
      smoke-auth:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - "./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro"

volumes:
  localstack-data:
