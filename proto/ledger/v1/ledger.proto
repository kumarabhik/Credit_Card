syntax = "proto3";

package cc.ledger.v1;

import "common/v1/common.proto";

option go_package = "github.com/kumarabhik/Credit_Card/gen/go/ledger/v1;ledgerv1";
option java_multiple_files = true;
option java_package = "com.cc.ledger.v1";

service LedgerService {
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Get(GetRequest) returns (GetResponse);
}

enum LedgerEntryType {
  LEDGER_ENTRY_TYPE_UNSPECIFIED = 0;
  LEDGER_ENTRY_TYPE_AUTHORIZATION = 1;
  LEDGER_ENTRY_TYPE_CAPTURE = 2;
  LEDGER_ENTRY_TYPE_REVERSAL = 3;
  LEDGER_ENTRY_TYPE_REFUND = 4;
  LEDGER_ENTRY_TYPE_CHARGEBACK = 5;
}

message WriteRequest {
  string txn_id = 1;
  string account_id = 2;
  cc.common.v1.Money amount = 3;
  string merchant_id = 4;
  LedgerEntryType type = 5;
  string idempotency_key = 6;
  int64 version_expected = 7;
  cc.common.v1.Decision decision = 8;
  int32 risk_score = 9;
  string reason_code = 10;
}

message WriteResponse {
  string ledger_id = 1;
  int64 version = 2;
  string event_id = 3;
}

message GetRequest {
  string ledger_id = 1;
}

message GetResponse {
  string ledger_id = 1;
  string txn_id = 2;
  string account_id = 3;
  string merchant_id = 4;
  LedgerEntryType type = 5;
  cc.common.v1.Money amount = 6;
  int64 version = 7;
  cc.common.v1.Decision decision = 8;
  int32 risk_score = 9;
  string reason_code = 10;
}
