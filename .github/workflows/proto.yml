name: proto

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/proto.yml"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "proto/**"
      - "scripts/tasks.py"
  pull_request:
    paths:
      - ".github/workflows/proto.yml"
      - "buf.gen.yaml"
      - "buf.yaml"
      - "proto/**"
      - "scripts/tasks.py"

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint protobuf contracts
        run: buf lint

      - name: Check breaking changes against the PR base branch
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=${{ github.base_ref }},subdir=proto"

      - name: Validate code generation template
        run: buf generate --template buf.gen.yaml
